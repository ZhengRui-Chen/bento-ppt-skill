repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [check, .]
      - id: ruff-format
        args: [--check]
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: compileall
        name: compileall
        entry: uv run python -m compileall -q scripts
        language: system
        types: [python]
        pass_filenames: false
      - id: import-check
        name: import-check
        entry: uv run python -c "import importlib; [importlib.import_module(m) for m in ['scripts.lint_cn','scripts.render','scripts.ppt','scripts.shoot','scripts.fetch','scripts.export','scripts.native_render']]; print('imports ok')"
        language: system
        types: [python]
        pass_filenames: false
      - id: lint-cn
        name: lint-cn
        entry: uv run python scripts/lint_cn.py examples/dify-intro/layout.json
        language: system
        types: [json]
        pass_filenames: false
