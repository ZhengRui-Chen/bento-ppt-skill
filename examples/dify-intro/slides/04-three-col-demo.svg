<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 720"
     width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#ece8df"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c44536"/>
      <stop offset="100%" stop-color="#8b5742"/>
    </linearGradient>
    <linearGradient id="accent-grad-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c44536"/>
      <stop offset="100%" stop-color="#8b5742"/>
    </linearGradient><radialGradient id="spot-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c44536" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#c44536" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5742" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#8b5742" stop-opacity="0"/>
    </radialGradient>    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>  </defs>

  <style type="text/css">
    text { font-family: &#39;PingFang SC&#39;, &#39;Noto Sans SC&#39;, &#39;Microsoft YaHei&#39;, sans-serif; }
    .mono { font-family: &#39;IBM Plex Mono&#39;, &#39;SF Mono&#39;, &#39;JetBrains Mono&#39;, Menlo, monospace; }
    .eyebrow { font-size: 13px; fill: #c44536; letter-spacing: 4px; font-weight: 600; font-family: &#39;IBM Plex Mono&#39;, &#39;SF Mono&#39;, &#39;JetBrains Mono&#39;, Menlo, monospace; }
    .h1 { font-size: 54px; fill: #111110; font-weight: 700; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; line-height: 1.15; }
    .h2 { font-size: 40px; fill: #111110; font-weight: 700; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; line-height: 1.2; }
    .h3 { font-size: 26px; fill: #111110; font-weight: 600; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; line-height: 1.25; }
    .h4 { font-size: 19px; fill: #111110; font-weight: 600; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .body { font-size: 16px; fill: #4a4845; line-height: 1.55; }
    .small { font-size: 12px; fill: #8a8882; }
    .stat-huge { font-size: 96px; fill: #111110; font-weight: 800; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .stat-unit { font-size: 24px; fill: #4a4845; font-weight: 500; }
  </style>

  <!-- 背景渐变 -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>  <!-- 纹理层（纸纹噪点） -->
  <rect width="1280" height="720" filter="url(#grain-filter)" opacity="0.04" pointer-events="none"/>
  <!-- 装饰光斑（极克制，仅右上角小光斑） -->
  <ellipse cx="1180" cy="60" rx="200" ry="160" fill="url(#spot-1)"/>
  <!-- layout 渲染区 -->
  <g transform="translate(56, 56)">
  <rect x="0" y="0" width="376" height="578"
        rx="12"
        fill="#FFFFFF" fill-opacity="0.9"
        stroke="#111110" stroke-opacity="0.05"
        stroke-width="1"/>
  <svg x="44" y="44"
       width="288" height="490"
       viewBox="0 0 288 490">
    <text x="0" y="17" class="eyebrow">搭建一个 AI 应用</text><text x="0" y="133" font-size="88" fill="#111110" font-weight="800" font-family="&#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif">5</text><text x="56" y="133" font-size="24" fill="#4a4845" font-weight="500">分钟</text><rect x="0" y="426" width="60" height="3" fill="url(#accent-grad)" rx="2"/><text x="0" y="458" font-size="12" fill="#4a4845">从模板到上线</text>
  </svg>
</g><g transform="translate(452, 56)">
  <rect x="0" y="0" width="376" height="578"
        rx="12"
        fill="#FFFFFF" fill-opacity="0.9"
        stroke="#111110" stroke-opacity="0.05"
        stroke-width="1"/>
  <svg x="44" y="44"
       width="288" height="490"
       viewBox="0 0 288 490">
    <text x="0" y="17" class="eyebrow">支持模型数</text><text x="0" y="133" font-size="88" fill="#111110" font-weight="800" font-family="&#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif">200</text><text x="152" y="133" font-size="24" fill="#4a4845" font-weight="500">+</text><rect x="0" y="426" width="60" height="3" fill="url(#accent-grad)" rx="2"/><text x="0" y="458" font-size="12" fill="#4a4845">OpenAI / Anthropic / 国产</text>
  </svg>
</g><g transform="translate(848, 56)">
  <rect x="0" y="0" width="376" height="578"
        rx="12"
        fill="#FFFFFF" fill-opacity="0.9"
        stroke="#111110" stroke-opacity="0.05"
        stroke-width="1"/>
  <svg x="44" y="44"
       width="288" height="490"
       viewBox="0 0 288 490">
    <text x="0" y="17" class="eyebrow">可观测性</text><text x="0" y="133" font-size="88" fill="#111110" font-weight="800" font-family="&#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif">100</text><text x="152" y="133" font-size="24" fill="#4a4845" font-weight="500">%</text><rect x="0" y="426" width="60" height="3" fill="url(#accent-grad)" rx="2"/><text x="0" y="458" font-size="12" fill="#4a4845">全链路日志与评测</text>
  </svg>
</g>

  <!-- 页脚：极细线 + 文字 -->
  <line x1="56" y1="698" x2="1224" y2="698" stroke="#111110" stroke-opacity="0.06" stroke-width="0.5"/>
  <text x="56" y="712" class="small">Dify 企业介绍</text>
  <text x="1224" y="712" class="small mono" text-anchor="end">04 / 08</text>
</svg>