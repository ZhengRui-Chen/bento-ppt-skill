       viewBox="0 0 1088 160">
    <text x="0" y="18" class="eyebrow">ARCHITECTURE</text><text x="0" y="78" font-size="42" fill="#1a1815" font-weight="700" font-family="&#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif">分层架构：从数据层到编排层</text><text x="0" y="116" font-size="20" fill="#5c5548" font-weight="400">每一层都可独立替换，整体可观测</text>
  </svg>
</g><g transform="translate(56, 316)">
