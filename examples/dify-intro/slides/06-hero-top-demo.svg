<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 720"
     width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#ece8df"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c44536"/>
      <stop offset="100%" stop-color="#8b5742"/>
    </linearGradient>
    <linearGradient id="accent-grad-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c44536"/>
      <stop offset="100%" stop-color="#8b5742"/>
    </linearGradient><radialGradient id="spot-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c44536" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#c44536" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5742" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#8b5742" stop-opacity="0"/>
    </radialGradient>    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>  </defs>

  <style type="text/css">
    text { font-family: &#39;PingFang SC&#39;, &#39;Noto Sans SC&#39;, &#39;Microsoft YaHei&#39;, sans-serif; }
    .mono { font-family: &#39;IBM Plex Mono&#39;, &#39;SF Mono&#39;, &#39;JetBrains Mono&#39;, Menlo, monospace; }
    .eyebrow { font-size: 13px; fill: #c44536; letter-spacing: 4px; font-weight: 600; font-family: &#39;IBM Plex Mono&#39;, &#39;SF Mono&#39;, &#39;JetBrains Mono&#39;, Menlo, monospace; }
    .h1 { font-size: 54px; fill: #111110; font-weight: 700; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; line-height: 1.15; }
    .h2 { font-size: 40px; fill: #111110; font-weight: 700; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; line-height: 1.2; }
    .h3 { font-size: 26px; fill: #111110; font-weight: 600; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; line-height: 1.25; }
    .h4 { font-size: 19px; fill: #111110; font-weight: 600; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .body { font-size: 16px; fill: #4a4845; line-height: 1.55; }
    .small { font-size: 12px; fill: #8a8882; }
    .stat-huge { font-size: 96px; fill: #111110; font-weight: 800; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .stat-unit { font-size: 24px; fill: #4a4845; font-weight: 500; }
  </style>

  <!-- 背景渐变 -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>  <!-- 纹理层（纸纹噪点） -->
  <rect width="1280" height="720" filter="url(#grain-filter)" opacity="0.04" pointer-events="none"/>
  <!-- 装饰光斑（极克制，仅右上角小光斑） -->
  <ellipse cx="1180" cy="60" rx="200" ry="160" fill="url(#spot-1)"/>
  <!-- layout 渲染区 -->
  <g transform="translate(56, 56)">
  <rect x="0" y="0" width="1168" height="240"
        rx="12"
        fill="#FFFFFF" fill-opacity="0.9"
        stroke="#111110" stroke-opacity="0.05"
        stroke-width="1"/>
  <svg x="44" y="44"
       width="1080" height="152"
       viewBox="0 0 1080 152">
    <text x="0" y="17" class="eyebrow">ARCHITECTURE</text><text x="0" y="75" font-size="40" fill="#111110" font-weight="700" font-family="&#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif">分层架构：从数据层到编排层</text><text x="0" y="112" font-size="19" fill="#4a4845" font-weight="400">每一层都可独立替换，整体可观测</text>
  </svg>
</g><g transform="translate(56, 316)">
  <rect x="0" y="0" width="376" height="318"
        rx="12"
        fill="#FFFFFF" fill-opacity="0.9"
        stroke="#111110" stroke-opacity="0.05"
        stroke-width="1"/>
  <svg x="44" y="44"
       width="288" height="230"
       viewBox="0 0 288 230">
    <text x="0" y="44" class="h3">数据层</text><g transform="translate(0, 72)" opacity="1.0"><rect x="-12" y="0" width="4" height="32" rx="2" fill="url(#accent-grad)"/>  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">01</text>
  <text x="48" y="22" font-size="18" fill="#111110" font-weight="700">向量库</text></g><g transform="translate(0, 119)" opacity="0.42">  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">02</text>
  <text x="48" y="22" font-size="18" fill="#4a4845" font-weight="600">对象存储</text></g><g transform="translate(0, 166)" opacity="0.42">  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">03</text>
  <text x="48" y="22" font-size="18" fill="#4a4845" font-weight="600">审计日志</text></g>
  </svg>
</g><g transform="translate(452, 316)">
  <rect x="0" y="0" width="376" height="318"
        rx="12"
        fill="#FFFFFF" fill-opacity="0.9"
        stroke="#111110" stroke-opacity="0.05"
        stroke-width="1"/>
  <svg x="44" y="44"
       width="288" height="230"
       viewBox="0 0 288 230">
    <text x="0" y="44" class="h3">能力层</text><g transform="translate(0, 72)" opacity="1.0"><rect x="-12" y="0" width="4" height="32" rx="2" fill="url(#accent-grad)"/>  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">01</text>
  <text x="48" y="22" font-size="18" fill="#111110" font-weight="700">模型路由</text></g><g transform="translate(0, 119)" opacity="0.42">  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">02</text>
  <text x="48" y="22" font-size="18" fill="#4a4845" font-weight="600">工具调用</text></g><g transform="translate(0, 166)" opacity="0.42">  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">03</text>
  <text x="48" y="22" font-size="18" fill="#4a4845" font-weight="600">知识检索</text></g>
  </svg>
</g><g transform="translate(848, 316)">
  <rect x="0" y="0" width="376" height="318"
        rx="12"
        fill="#FFFFFF" fill-opacity="0.9"
        stroke="#111110" stroke-opacity="0.05"
        stroke-width="1"/>
  <svg x="44" y="44"
       width="288" height="230"
       viewBox="0 0 288 230">
    <text x="0" y="44" class="h3">编排层</text><g transform="translate(0, 72)" opacity="1.0"><rect x="-12" y="0" width="4" height="32" rx="2" fill="url(#accent-grad)"/>  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">01</text>
  <text x="48" y="22" font-size="18" fill="#111110" font-weight="700">Workflow</text></g><g transform="translate(0, 119)" opacity="0.42">  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">02</text>
  <text x="48" y="22" font-size="18" fill="#4a4845" font-weight="600">Agent</text></g><g transform="translate(0, 166)" opacity="0.42">  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent-grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">03</text>
  <text x="48" y="22" font-size="18" fill="#4a4845" font-weight="600">Chat 流</text></g>
  </svg>
</g>

  <!-- 页脚：极细线 + 文字 -->
  <line x1="56" y1="698" x2="1224" y2="698" stroke="#111110" stroke-opacity="0.06" stroke-width="0.5"/>
  <text x="56" y="712" class="small">Dify 企业介绍</text>
  <text x="1224" y="712" class="small mono" text-anchor="end">06 / 08</text>
</svg>