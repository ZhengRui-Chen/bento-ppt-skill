<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 720"
     width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#EDE6D8"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8654A"/>
      <stop offset="100%" stop-color="#D4956B"/>
    </linearGradient>
    <linearGradient id="accent-grad-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8654A"/>
      <stop offset="100%" stop-color="#D4956B"/>
    </linearGradient><radialGradient id="spot-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8654A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#B8654A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4956B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4956B" stop-opacity="0"/>
    </radialGradient>    <pattern id="bg-texture" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.9" fill="#1a1815" fill-opacity="0.06"/>
    </pattern>  </defs>

  <style type="text/css">
    text { font-family: &#39;PingFang SC&#39;, &#39;Noto Sans SC&#39;, &#39;Microsoft YaHei&#39;, sans-serif; }
    .mono { font-family: &#39;Menlo&#39;, &#39;SF Mono&#39;, &#39;IBM Plex Mono&#39;, &#39;Courier&#39;, monospace; }
    .eyebrow { font-size: 14px; fill: #D4956B; letter-spacing: 3px; font-weight: 600; font-family: &#39;Menlo&#39;, &#39;SF Mono&#39;, &#39;IBM Plex Mono&#39;, &#39;Courier&#39;, monospace; }
    .h1 { font-size: 56px; fill: #1a1815; font-weight: 700; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .h2 { font-size: 42px; fill: #1a1815; font-weight: 700; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .h3 { font-size: 28px; fill: #1a1815; font-weight: 600; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .h4 { font-size: 20px; fill: #1a1815; font-weight: 600; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .body { font-size: 17px; fill: #5c5548; }
    .small { font-size: 13px; fill: #9c9588; }
    .stat-huge { font-size: 100px; fill: #1a1815; font-weight: 800; font-family: &#39;Songti SC&#39;, &#39;Noto Serif SC&#39;, &#39;STKaiti&#39;, &#39;Times New Roman&#39;, serif; }
    .stat-unit { font-size: 26px; fill: #5c5548; font-weight: 500; }
  </style>

  <!-- 背景渐变 -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>  <!-- 纹理层 -->
  <rect width="1280" height="720" fill="url(#bg-texture)"/>
  <!-- 装饰光斑（极淡，不干扰阅读） -->
  <ellipse cx="1180" cy="80" rx="280" ry="220" fill="url(#spot-1)"/>
  <ellipse cx="120" cy="640" rx="280" ry="200" fill="url(#spot-2)"/>
  <!-- layout 渲染区 -->
  <g transform="translate(56, 56)">
  <rect x="0" y="0" width="1168" height="578"
        rx="16"
        fill="#FFFFFF" fill-opacity="0.82"
        stroke="#1a1815" stroke-opacity="0.07"
        stroke-width="1"/>
  <svg x="40" y="40"
       width="1088" height="498"
       viewBox="0 0 1088 498">
    <text x="0" y="18" class="eyebrow">THANK YOU</text><text x="0" y="92" font-size="56" fill="#1a1815" font-weight="700">让我们一起，把 AI 装进每一个业务流程</text><text x="0" y="138" font-size="28" fill="#5c5548" font-weight="400">联系 sales@dify.ai 安排技术演示</text><rect x="0" y="418" width="120" height="4" fill="url(#accent-grad)" rx="2"/><text x="0" y="474" class="body">Dify · 2026</text>
  </svg>
</g>

  <!-- 页脚 -->
  <text x="56" y="702" class="small">Dify 企业介绍</text>
  <text x="1224" y="702" class="small mono" text-anchor="end">08 / 08</text>
</svg>